<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tochi's Movie Project</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="logo">Tochi's <span>Movie Project</span></div>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search movies, series..." autocomplete="off" />
      <button class="search-btn" onclick="triggerSearch()">Search</button>
    </div>
  </header>

  <!-- API Key Bar -->
  <div class="api-banner">
    <label>OMDB API Key</label>
    <input id="apiKeyInput" type="password" placeholder="paste key here..." />
    <button class="btn-save" onclick="saveKey()">Save</button>
    <a class="api-link" href="https://www.omdbapi.com/apikey.aspx" target="_blank">Get free key</a>
    <span id="keyStatus"></span>
  </div>

  <!-- Main -->
  <main>
    <div class="section-label" id="sectionLabel">Featured</div>
    <div class="results-info" id="resultsInfo"></div>
    <div class="movie-grid" id="movieGrid"></div>
    <div class="pagination" id="pagination" style="display:none;"></div>
  </main>

  <!-- Detail Overlay -->
  <div id="detailOverlay" class="detail-overlay">
    <div class="detail-box">
      <div class="detail-header">
        <div>
          <div class="detail-title" id="dTitle"></div>
          <div class="detail-subtitle" id="dSubtitle"></div>
        </div>
        <button class="close-btn" onclick="closeDetail()">x</button>
      </div>
      <div class="detail-body" id="detailBody">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
